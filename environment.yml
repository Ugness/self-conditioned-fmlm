name: elf-torch
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pip:
      # create:  pip install --upgrade torch torchvision --index-url https://download.pytorch.org/whl/cu128
      - torch
      - torchvision
      - --extra-index-url=https://download.pytorch.org/whl/cu128
      - lightning
      - transformers>=4.41.2,<4.45.0
      - tokenizers>=0.19.0
      - sentencepiece>=0.1.99
      - datasets>=2.19.0
      - huggingface-hub>=0.23.0
      - safetensors>=0.4.0
      - accelerate>=0.30.0
      - einops
      - numpy>=1.26.4,<2.0.0
      - scipy>=1.12.0
      - PyYAML>=6.0.1
      - tqdm>=4.66.0
      - wandb==0.16.6
      - sacrebleu
      - rouge-score
      - matplotlib>=3.8.0
      - requests>=2.31.0
